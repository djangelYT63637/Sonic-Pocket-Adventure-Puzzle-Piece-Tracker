<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Pocket Adventure Piece Tracker</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="stats-container">
            <span>Stage Progress: <strong id="stagePerc">0%</strong></span>
            <div class="progress-bar-container">
                <div id="stageFill" class="progress-bar-fill"></div>
            </div>
            <span>Total Collected: <strong id="totalStats">0/0</strong></span>
        </div>
    </header>

    <div class="main-layout">
        
        <div id="levelMenu" class="level-menu"></div>

        <div id="viewport" class="viewport">
            <canvas id="canvas"></canvas>
        </div>

        <div id="pieceChecklist" class="checklist-grid"></div>

    </div>

    <div class="admin-ui" style="display: none; gap: 10px; padding: 10px; background: #220000; justify-content: center;">
        <button onclick="adminManualAdd()">Add Piece At Center</button>
        <button onclick="adminManualDelete()">Delete Piece By ID</button>
        <button onclick="exportMasterJSON()">Export Coordinates JSON</button>
        <label style="color: #fff; display: flex; align-items: center; gap: 5px;">
            Scanner Template:
            <input type="file" id="adminTemplateFileInput" accept="image/*">
        </label>
        <button onclick="runMobileScanner()">Execute Canvas Array Scan</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
