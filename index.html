<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPA: PUZZLE PIECE DETECTOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --sonic-blue: #0042ad;
            --sonic-yellow: #ffe700;
            --sonic-red: #d60000;
            --emerald-green: #00ff41;
            --panel-bg: #001233;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Press Start 2P', cursive; font-size: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            overflow-x: hidden; touch-action: none;
        }

        header {
            width: 100%; background: var(--sonic-blue); padding: 15px 0;
            text-align: center; border-bottom: 6px solid var(--sonic-yellow);
            box-shadow: 0 10px 0 var(--sonic-red);
        }

        .main-layout {
            display: flex; width: 98%; max-width: 1400px;
            gap: 15px; margin-top: 20px; flex-wrap: wrap; height: calc(100vh - 120px);
        }

        .sidebar {
            flex: 1; min-width: 280px; background: var(--panel-bg);
            border: 4px solid #fff; padding: 15px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }

        .level-btn {
            width: 100%; text-align: left; padding: 10px; margin-bottom: 5px;
            background: transparent; border: 1px solid var(--sonic-blue);
            color: #fff; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer;
        }
        .level-btn.active { background: var(--sonic-blue); border-color: var(--sonic-yellow); }

        .check-item {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            padding: 8px; border: 1px solid #333; cursor: pointer; font-size: 7px;
        }
        .check-item.collected { color: #555; border-color: #222; text-decoration: line-through; }

        .container { flex: 3; min-width: 350px; background: var(--panel-bg); border: 4px solid #fff; display: flex; flex-direction: column; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; border-bottom: 2px solid #fff; background: #000; }

        button {
            padding: 8px; background: var(--emerald-green); border: 2px solid #fff;
            font-family: 'Press Start 2P', cursive; cursor: pointer; font-size: 7px;
        }
        button.active-mode { background: #fff; color: #000; box-shadow: 0 0 8px #fff; }
        button.erase { background: var(--sonic-red); color: #fff; }

        .viewer {
            flex-grow: 1; overflow: auto; background: #111; position: relative;
            cursor: grab; display: block;
        }
        .viewer:active { cursor: grabbing; }

        canvas { display: block; image-rendering: pixelated; transform-origin: 0 0; transition: transform 0.1s ease-out; }

        #stats-bar { background: var(--sonic-red); padding: 8px; display: flex; justify-content: space-between; font-size: 8px; }

        /* Progress Bar */
        .progress-container { width: 100%; height: 10px; background: #000; border: 1px solid #fff; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--emerald-green); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<header><h1>SONIC POCKET ADVENTURE: PUZZLE PIECE DETECTOR</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <div style="color:var(--sonic-yellow); font-size:9px;">ZONE SELECT:</div>
        <div id="levelMenu"></div>
        <hr>
        <div style="color:var(--sonic-yellow); font-size:9px;">PROGRESS:</div>
        <div class="progress-container"><div id="progFill" class="progress-fill"></div></div>
        <div id="pieceChecklist"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <button onclick="document.getElementById('targetFile').click()">SET PIECE</button>
            <button onclick="document.getElementById('mapFile').click()">LOAD MAP</button>
            <button onclick="document.getElementById('bgmFile').click()">SET BGM</button>
            <button id="scanBtn" style="background:var(--sonic-yellow); color:#000">SCAN</button>
            <button id="modeCorrect" onclick="setMode('correct')">CORRECT</button>
            <button id="modeErase" class="erase" onclick="setMode('erase')">ERASE</button>
            <button onclick="adjustZoom(1.25)">+</button>
            <button onclick="adjustZoom(0.8)">-</button>
            <button onclick="downloadMap()" style="background:var(--sonic-blue); color:#fff">EXPORT</button>
            <button onclick="clearCurrentMarkers()" class="erase">CLEAR</button>
        </div>

        <div id="stats-bar">
            <span>ZONE: <span id="curZone">NONE</span></span>
            <span>PIECES: <span id="count">0</span></span>
        </div>

        <div class="viewer" id="viewer">
            <canvas id="canvas"></canvas>
        </div>
    </div>
</div>

<input type="file" id="targetFile" hidden accept="image/*">
<input type="file" id="mapFile" hidden accept="image/*">
<input type="file" id="bgmFile" hidden accept="audio/*">
<audio id="bgm" loop></audio>

<script>
    const levels = [
        "Neo South Island Act 1", "Neo South Island Act 2", "Secret Plant Act 1", "Secret Plant Act 2",
        "Cosmic Casino Act 1", "Cosmic Casino Act 2", "Aquatic Relix Act 1", "Aquatic Relix Act 2",
        "Sky Chase", "Aerobase", "Gigantic Angel Act 1", "Gigantic Angel Act 2", "Last Utopia"
    ];

    let db, currentLevel = levels[0], markers = [], zoom = 1.0, currentMode = 'explore';
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), bgm = document.getElementById('bgm');

    // --- INDEXED DB ENGINE ---
    const request = indexedDB.open("SPADetectorDB", 2);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("assets")) db.createObjectStore("assets");
        if(!db.objectStoreNames.contains("markers")) db.createObjectStore("markers");
    };
    request.onsuccess = e => { db = e.target.result; init(); };

    async function saveAsset(key, val) { const tx = db.transaction("assets", "readwrite"); tx.objectStore("assets").put(val, key); }
    async function getAsset(key) { return new Promise(r => { db.transaction("assets").objectStore("assets").get(key).onsuccess = e => r(e.target.result); }); }
    async function saveMarkers() { const tx = db.transaction("markers", "readwrite"); tx.objectStore("markers").put(markers, currentLevel); }
    async function getMarkers(lvl) { return new Promise(r => { db.transaction("markers").objectStore("markers").get(lvl).onsuccess = e => r(e.target.result || []); }); }

    // --- INITIALIZATION ---
    async function init() {
        const menu = document.getElementById('levelMenu');
        levels.forEach(lvl => {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = lvl;
            btn.onclick = () => switchLevel(lvl);
            menu.appendChild(btn);
        });

        const savedBgm = await getAsset('bgm');
        if(savedBgm) bgm.src = URL.createObjectURL(savedBgm);
        switchLevel(currentLevel);
    }

    async function switchLevel(lvl) {
        currentLevel = lvl;
        document.getElementById('curZone').innerText = lvl.toUpperCase();
        document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.innerText === lvl));
        
        markers = await getMarkers(lvl);
        const mapData = await getAsset(`map_${lvl}`);
        if(mapData) {
            const img = await loadImage(URL.createObjectURL(mapData));
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        } else {
            ctx.clearRect(0,0,canvas.width, canvas.height);
        }
        render();
    }

    // --- SCANNER (100% MATCH) ---
    document.getElementById('scanBtn').onclick = async () => {
        const templateBlob = await getAsset('template');
        if(!templateBlob || canvas.width === 0) return alert("Upload Template + Map first!");
        
        const tImg = await loadImage(URL.createObjectURL(templateBlob));
        const tPix = getPixels(tImg);
        const mData = ctx.getImageData(0,0, canvas.width, canvas.height).data;
        const mW = canvas.width;

        for(let y=0; y < canvas.height - 22; y++) {
            for(let x=0; x < canvas.width - 15; x++) {
                let match = true;
                for(let p of tPix) {
                    const idx = ((y + p.y) * mW + (x + p.x)) * 4;
                    // Strict 100% Match (Tolerance = 0)
                    if(mData[idx] !== p.r || mData[idx+1] !== p.g || mData[idx+2] !== p.b) { match = false; break; }
                }
                if(match && !isDuplicate(x, y)) markers.push({x, y, collected: false});
            }
        }
        saveMarkers(); render();
    };

    function isDuplicate(x, y) { return markers.some(m => Math.abs(m.x - x) < 5 && Math.abs(m.y - y) < 5); }

    // --- UI MODES & INTERACTION ---
    function setMode(mode) {
        currentMode = (currentMode === mode) ? 'explore' : mode;
        document.getElementById('modeCorrect').classList.toggle('active-mode', currentMode === 'correct');
        document.getElementById('modeErase').classList.toggle('active-mode', currentMode === 'erase');
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;

        if(currentMode === 'correct') {
            markers.push({x: Math.round(x-7), y: Math.round(y-11), collected: false});
        } else if(currentMode === 'erase') {
            markers = markers.filter(m => !(Math.abs(m.x + 7 - x) < 15 && Math.abs(m.y + 11 - y) < 15));
        } else {
            // Toggle collected in explore mode
            const m = markers.find(m => (Math.abs(m.x + 7 - x) < 15 && Math.abs(m.y + 11 - y) < 15));
            if(m) m.collected = !m.collected;
        }
        saveMarkers(); render();
    });

    function render() {
        // Redraw Map
        getAsset(`map_${currentLevel}`).then(async blob => {
            if(!blob) return;
            const img = await loadImage(URL.createObjectURL(blob));
            ctx.drawImage(img, 0, 0);
            
            markers.forEach(m => {
                ctx.lineWidth = 3;
                ctx.strokeStyle = m.collected ? '#444' : '#00ff41';
                ctx.strokeRect(m.x, m.y, 15, 22);
                if(m.collected) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(m.x, m.y, 15, 22); }
            });

            updateChecklist();
        });
    }

    function updateChecklist() {
        const list = document.getElementById('pieceChecklist');
        list.innerHTML = '';
        let collectedCount = 0;
        markers.forEach((m, i) => {
            if(m.collected) collectedCount++;
            const item = document.createElement('div');
            item.className = `check-item ${m.collected ? 'collected' : ''}`;
            item.innerHTML = `[${m.collected ? 'X' : ' '}] PIECE #${i+1}`;
            item.onclick = () => { m.collected = !m.collected; saveMarkers(); render(); };
            list.appendChild(item);
        });
        document.getElementById('count').innerText = markers.length;
        document.getElementById('progFill').style.width = markers.length ? (collectedCount / markers.length * 100) + '%' : '0%';
    }

    // --- HELPERS ---
    function adjustZoom(factor) { zoom *= factor; canvas.style.transform = `scale(${zoom})`; }
    
    document.getElementById('mapFile').onchange = e => {
        const file = e.target.files[0];
        saveAsset(`map_${currentLevel}`, file).then(() => switchLevel(currentLevel));
    };
    document.getElementById('targetFile').onchange = e => saveAsset('template', e.target.files[0]);
    document.getElementById('bgmFile').onchange = e => {
        const file = e.target.files[0];
        saveAsset('bgm', file).then(() => { bgm.src = URL.createObjectURL(file); bgm.play(); });
    };

    function clearCurrentMarkers() { if(confirm("Clear all pieces in this zone?")) { markers = []; saveMarkers(); render(); } }
    
    function downloadMap() {
        const link = document.createElement('a');
        link.download = `SPA_${currentLevel}_Complete.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    function getPixels(img) {
        const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
        const x = c.getContext('2d'); x.drawImage(img, 0, 0);
        const d = x.getImageData(0,0, img.width, img.height).data;
        const p = [];
        for(let i=0; i<d.length; i+=4) if(d[i+3]>200) p.push({x:(i/4)%img.width, y:Math.floor((i/4)/img.width), r:d[i], g:d[i+1], b:d[i+2]});
        return p;
    }
    function loadImage(s) { return new Promise(r => {const i=new Image(); i.onload=()=>r(i); i.src=s;}); }
</script>
</body>
</html>
