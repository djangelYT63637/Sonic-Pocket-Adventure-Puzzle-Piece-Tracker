<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Pocket Adventure: Puzzle Piece Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1>SONIC POCKET ADVENTURE: PIECE TRACKER</h1>
    </header>

    <div class="main-layout">
        
        <div class="dashboard">
            <div class="stats-row">
                <div class="stat-block">
                    <div class="stat-label">
                        <span>ZONE PROGRESS</span>
                        <span id="stagePerc">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="stageFill" class="fill-stage"></div>
                    </div>
                </div>
                
                <div class="stat-block">
                    <div class="stat-label">
                        <span>GAME TOTAL</span>
                        <span id="totalStats">0/0 (0%)</span>
                    </div>
                    <div class="progress-bar">
                        <div id="totalFill" class="fill-total"></div>
                    </div>
                </div>
            </div>

            <div class="level-grid" id="levelMenu"></div>

            <div class="checklist-container">
                <div class="checklist-title">CHECKLIST (TAP TO LOCATE | DBL-TAP OR LONG-TAP TO CHECK):</div>
                <div id="pieceChecklist" class="checklist-grid"></div>
            </div>
        </div>

        <div class="container">
            <div class="toolbar">
                <button onclick="zoomToPiece(-1)">RESET VIEW</button>
                
                <div class="admin-ui" style="display: none; gap: 4px; align-items: center; width: 100%;">
                    <button onclick="triggerAdminInput('adminTemplateFileInput')" style="background: var(--sonic-blue); color: #fff;">
                        LOAD TEMPLATE (.PNG)
                    </button>
                    <button onclick="executionTemplateAutomatedScan()" style="background: var(--sonic-yellow); color: #000;">
                        RUN SCANNER (100%)
                    </button>
                    <button onclick="exportSystemMasterJSON()" class="export-btn">
                        EXPORT MASTER JSON
                    </button>
                    <span style="font-size: 7px; color: var(--sonic-red); margin-left: auto; font-weight: bold; padding-right: 5px;">
                        ADMIN MODE [CLICK SPACE TO ADD | SHIFT+CLICK MARKER TO ERASE]
                    </span>
                </div>
            </div>

            <div class="viewport" id="viewport">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <input type="file" id="adminTemplateFileInput" hidden accept="image/*">
    <audio id="bgm" loop></audio>

    <script src="./app.js"></script>
</body>
</html>
