<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Pocket Adventure: Puzzle Piece Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="assets/logo.png" alt="SONIC POCKET ADVENTURE: PIECE TRACKER" class="header-logo">
    </header>

    <div class="main-layout">
        <div class="dashboard">
            <div class="stats-row">
                <div class="stat-block">
                    <div class="stat-label"><span>ACT PROGRESS</span><span id="stagePerc">0% [0/0]</span></div>
                    <div class="progress-bar"><div id="stageFill" class="fill-stage"></div></div>
                </div>
                <div class="stat-block">
                    <div class="stat-label"><span>GAME TOTAL</span><span id="totalStats">0% [0/0]</span></div>
                    <div class="progress-bar"><div id="totalFill" class="fill-total"></div></div>
                </div>
            </div>

            <div class="level-grid" id="levelMenu"></div>

            <div class="checklist-container">
                <div class="checklist-title">CHECKLIST (TAP TO VIEW | DBL-TAP TO CHECK):</div>
                <div id="pieceChecklist" class="checklist-grid"></div>
            </div>
        </div>

        <div class="container">
            <div class="toolbar">
                <button onclick="centerMapInViewport();">RESET VIEW</button>
                
                <div class="admin-ui" style="display:none; gap:4px; flex-wrap:wrap; width:100%;">
                    <button onclick="adminManualAdd()" style="background:#00ff41; color:#000;">+ ADD AT CENTER</button>
                    <button onclick="adminManualDelete()" style="background:#d60000; color:#fff;">- DELETE ID</button>
                    <button onclick="runAutoScanner()" style="background:#ffe700; color:#000;">RUN AUTO SCANNER</button>
                    <button onclick="exportMasterJSON()" style="background:#fff; color:#000;">EXPORT JSON</button>
                </div>
            </div>

            <div class="viewport" id="viewport">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
